#
# cssr2rtcm3.conf: default configuration for CSSR to RTCM3 converter
#
# This configuration is used by cssr2rtcm3 to set processing options
# for SSR→OSR conversion. Most options are inherited from CLASLIB defaults.
#

# --- Positioning ---
pos1-posmode       =ssr2osr     # SSR to OSR conversion mode
pos1-frequency     =l1+2+3      # GPS/QZSS L1+L2+L5, Galileo E1+E5b
pos1-elmask        =0           # elevation mask (deg) — include all visible sats
pos1-snrmask_r     =off
pos1-dynamics      =off
pos1-tidecorr      =1           # solid earth tides only
pos1-ionoopt       =est-adaptive
pos1-tropopt       =off
pos1-sateph        =brdc+ssrapc
pos1-posopt2       =off         # receiver antenna model (off for VRS)
pos1-posopt3       =on          # phase windup correction
pos1-posopt4       =on          # exclude eclipsing satellites
pos1-navsys        =25          # GPS + Galileo + QZSS

# --- Files ---
# Set these paths according to your installation
file-cssrgridfile  =./tests/data/claslib/clas_grid.def
file-blqfile       =
file-eopfile       =
file-rcvantfile    =
file-isbfile       =
file-phacycfile    =
